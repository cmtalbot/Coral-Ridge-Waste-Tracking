<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waste Log — Coral Ridge 2225</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f4;color:#1a1a19;min-height:100vh}
.app{max-width:680px;margin:0 auto;background:#fff;min-height:100vh;display:flex;flex-direction:column}
.header{padding:16px;border-bottom:1px solid #e5e5e3;display:flex;align-items:center;justify-content:space-between;gap:8px;background:#fff;position:sticky;top:0;z-index:10}
.header h1{font-size:20px;font-weight:600;color:#1a1a19}
.header .date{font-size:13px;color:#6b6b68;margin-top:2px}
.btn-ghost{padding:8px 14px;background:transparent;color:#6b6b68;border:1px solid #d4d4d0;border-radius:8px;font-size:14px;cursor:pointer}
.search-bar{padding:12px 16px;border-bottom:1px solid #e5e5e3;background:#fff;position:sticky;top:69px;z-index:9}
.search-bar input{width:100%;padding:9px 12px;font-size:15px;border:1px solid #d4d4d0;border-radius:8px;background:#f5f5f4;color:#1a1a19;outline:none}
.search-bar input:focus{border-color:#888}
.cat-filter{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;border-bottom:1px solid #e5e5e3;background:#fff;position:sticky;top:118px;z-index:8;scrollbar-width:none}
.cat-filter::-webkit-scrollbar{display:none}
.cat-btn{flex-shrink:0;padding:5px 13px;font-size:12px;border:1px solid #d4d4d0;border-radius:20px;background:#fff;color:#6b6b68;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.cat-btn.active{border-color:#1a1a19;color:#1a1a19;font-weight:600}
.items-list{padding:8px 16px;display:flex;flex-direction:column;gap:6px;flex:1;overflow-y:auto}
.item-row{display:flex;align-items:center;gap:10px;padding:11px 12px;border:1px solid #e5e5e3;border-radius:10px;background:#fff;transition:border-color 0.15s,background 0.15s}
.item-row.has-waste{border-color:#185FA5;background:#e6f1fb}
.item-name{font-size:14px;color:#1a1a19;line-height:1.3}
.item-cat{font-size:11px;color:#6b6b68;margin-top:1px}
.qty-ctrl{display:flex;align-items:center;gap:6px;flex-shrink:0}
.qty-btn{width:32px;height:32px;border:1px solid #d4d4d0;border-radius:8px;background:#f5f5f4;color:#1a1a19;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;user-select:none}
.qty-btn:active{background:#e5e5e3;transform:scale(0.94)}
.qty-val{width:28px;text-align:center;font-size:15px;font-weight:600;color:#1a1a19}
.qty-unit{font-size:11px;color:#6b6b68;min-width:30px}
.footer{padding:12px 16px;border-top:1px solid #e5e5e3;display:flex;gap:8px;align-items:center;background:#fff;position:sticky;bottom:0}
.summary-pill{font-size:13px;color:#6b6b68;flex:1}
.summary-pill span{font-weight:600;color:#1a1a19}
.btn-primary{padding:10px 20px;background:#1a1a19;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.btn-primary:active{opacity:0.8}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:flex-end;justify-content:center;z-index:100}
.modal{background:#fff;width:100%;max-width:680px;border-radius:16px 16px 0 0;padding:20px 20px 36px;max-height:80vh;overflow-y:auto}
.modal h2{font-size:17px;font-weight:600;margin-bottom:3px}
.modal .sub{font-size:13px;color:#6b6b68;margin-bottom:16px}
.cat-label{font-size:11px;font-weight:600;color:#6b6b68;text-transform:uppercase;letter-spacing:0.05em;padding:10px 0 4px}
.report-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #e5e5e3;font-size:14px}
.report-row:last-child{border-bottom:none}
.rqty{font-weight:600;white-space:nowrap}
.runit{font-size:12px;color:#6b6b68;margin-left:3px;font-weight:400}
.empty{text-align:center;padding:32px 16px;color:#6b6b68;font-size:14px}
.modal-btns{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.copy-area{background:#f5f5f4;border-radius:8px;padding:12px;font-size:13px;font-family:monospace;white-space:pre-wrap;color:#1a1a19;margin-top:12px;line-height:1.6;max-height:200px;overflow-y:auto}
.copied{background:#0F6E56!important}
</style>
</head>

  <div class="footer">
    <div class="summary-pill">Wasted: <span id="itemCount">0</span> types &nbsp;·&nbsp; <span id="unitCount">0</span> units</div>
    <button class="btn-primary" id="reportBtn">View report</button>

</div>

<div class="modal-bg" id="modalBg" style="display:none">
  <div class="modal">

    <div id="reportList"></div>
    <div class="copy-area" id="copyArea" style="display:none"></div>
    <div class="modal-btns">
      <button class="btn-primary" id="copyBtn">Copy for Rosnet</button>

const waste={};
let activeCategory='All';
let searchQuery='';
const cats=['All',...new Set(ITEMS.map(i=>i.cat))];

function dateStr(){
  return new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
}
document.getElementById('dateLabel').textContent=dateStr();

const catFilter=document.getElementById('catFilter');
cats.forEach(c=>{
  const btn=document.createElement('button');
  btn.className='cat-btn'+(c==='All'?' active':'');
  btn.textContent=c;
  btn.onclick=()=>{
    activeCategory=c;
    document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    render();
  };
  catFilter.appendChild(btn);
});

document.getElementById('searchInput').addEventListener('input',e=>{
  searchQuery=e.target.value.toLowerCase();
  render();
});

function render(){
  const list=document.getElementById('itemsList');
  list.innerHTML='';
  const filtered=ITEMS.filter(item=>{
    const catOk=activeCategory==='All'||item.cat===activeCategory;
    const searchOk=!searchQuery||item.name.toLowerCase().includes(searchQuery)||item.cat.toLowerCase().includes(searchQuery);
    return catOk&&searchOk;
  });
  if(filtered.length===0){
    list.innerHTML='<div class="empty">No items found</div>';
    return;
  }
  filtered.forEach(item=>{
    const qty=waste[item.id]||0;
    const row=document.createElement('div');
    row.className='item-row'+(qty>0?' has-waste':'');
    row.innerHTML=`
      <div style="flex:1;min-width:0">
        <div class="item-name">${item.name}</div>
        <div class="item-cat">${item.cat}</div>
      </div>
      <div class="qty-ctrl">
        <button class="qty-btn" data-id="${item.id}" data-dir="-1">−</button>
        <div class="qty-val">${qty}</div>
        <button class="qty-btn" data-id="${item.id}" data-dir="1">+</button>
        <div class="qty-unit">${item.unit}</div>
      </div>`;
    list.appendChild(row);
  });
  updateSummary();
}

document.getElementById('itemsList').addEventListener('click',e=>{
  const btn=e.target.closest('[data-dir]');
  if(!btn)return;
  const id=btn.dataset.id;
  const dir=parseInt(btn.dataset.dir);
  waste[id]=Math.max(0,(waste[id]||0)+dir);
  render();
});

function updateSummary(){
  const w=Object.entries(waste).filter(([,v])=>v>0);
  document.getElementById('itemCount').textContent=w.length;
  document.getElementById('unitCount').textContent=w.reduce((s,[,v])=>s+v,0);
}

document.getElementById('clearBtn').onclick=()=>{
  if(confirm('Reset all waste counts?')){
    Object.keys(waste).forEach(k=>waste[k]=0);
    render();
  }
};

document.getElementById('reportBtn').onclick=()=>{
  const wasted=Object.entries(waste).filter(([,v])=>v>0).map(([id,qty])=>({...ITEMS.find(i=>i.id===id),qty}));
  const reportList=document.getElementById('reportList');
  const copyArea=document.getElementById('copyArea');
  reportList.innerHTML='';
  copyArea.style.display='none';
  document.getElementById('reportSub').textContent=`${dateStr()} — ${wasted.length} item type(s) wasted`;
  if(wasted.length===0){
    reportList.innerHTML='<div class="empty">No waste logged yet.</div>';
  } else {
    const byCat={};
    wasted.forEach(i=>{if(!byCat[i.cat])byCat[i.cat]=[];byCat[i.cat].push(i);});
    Object.entries(byCat).forEach(([cat,items])=>{
      const h=document.createElement('div');
      h.className='cat-label';
      h.textContent=cat;
      reportList.appendChild(h);
      items.forEach(item=>{
        const row=document.createElement('div');
        row.className='report-row';
        row.innerHTML=`<span>${item.name}</span><span class="rqty">${item.qty}<span class="runit">${item.unit}</span></span>`;
        reportList.appendChild(row);
      });
    });
  }
  document.getElementById('modalBg').style.display='flex';
};

document.getElementById('copyBtn').onclick=()=>{
  const wasted=Object.entries(waste).filter(([,v])=>v>0).map(([id,qty])=>({...ITEMS.find(i=>i.id===id),qty}));
  if(wasted.length===0)return;
  let txt=`WASTE LOG — Coral Ridge Cinema 2225\n${dateStr()}\n${'─'.repeat(40)}\n`;
  const byCat={};
  wasted.forEach(i=>{if(!byCat[i.cat])byCat[i.cat]=[];byCat[i.cat].push(i);});
  Object.entries(byCat).forEach(([cat,items])=>{
    txt+=`\n[${cat}]\n`;
    items.forEach(i=>{txt+=`  ${i.name}: ${i.qty} ${i.unit}\n`;});
  });
  txt+=`\nTotal units wasted: ${wasted.reduce((s,i)=>s+i.qty,0)}`;
  const area=document.getElementById('copyArea');
  area.textContent=txt;
  area.style.display='block';
  navigator.clipboard.writeText(txt).catch(()=>{});
  const btn=document.getElementById('copyBtn');
  btn.textContent='Copied!';
  btn.classList.add('copied');
  setTimeout(()=>{btn.textContent='Copy for Rosnet';btn.classList.remove('copied');},2000);
};

document.getElementById('closeModal').onclick=()=>{
  document.getElementById('modalBg').style.display='none';
};

render();
